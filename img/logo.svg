<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>Alice Tran Psychiatric Care</title>
  <circle cx="50" cy="50" r="46" fill="#F5F2EC" stroke="#2E4A3C" stroke-width="2.8"/>
  <g transform="rotate(22, 50, 50)">
    <!-- Leaf: rounded tip at top, tapers to pointed stem at bottom -->
    <path d="M50,13 C72,13 80,32 80,46 C80,63 65,77 50,83 C35,77 20,63 20,46 C20,32 28,13 50,13 Z"
